apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    app: no-db-demo

---
# ==================== ConfigMap ====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: no-db-demo-config
  namespace: demo
data:
  APP_PORT: "8080"
  # 如果有外部配置，可以在这里添加 key-value
  # APPLICATION_PROFILES: "prod"

---
# ==================== Service ====================
apiVersion: v1
kind: Service
metadata:
  name: no-db-demo
  namespace: demo
  labels:
    app: no-db-demo
  annotations:
    description: "无数据库依赖的 Spring Boot 应用 Service"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: no-db-demo

---
# ==================== Deployment ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-db-demo
  namespace: demo
  labels:
    app: no-db-demo
  annotations:
    description: "无数据库依赖的 Spring Boot 应用"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: no-db-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: no-db-demo
      annotations:
        # prometheus 监控
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: no-db-demo
          image: your-registry/no-db-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          # ==================== 健康检查 ====================
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /actuator/health/startup
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 30
          # ==================== 环境变量 ====================
          env:
            - name: APP_PORT
              valueFrom:
                configMapKeyRef:
                  name: no-db-demo-config
                  key: APP_PORT
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx128m"
            # 如有需要可接入外部数据库，取消注释：
            # - name: SPRING_DATASOURCE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: db-secret
            #       key: url
            # - name: SPRING_DATASOURCE_USERNAME
            #   valueFrom:
            #     secretKeyRef:
            #       name: db-secret
            #       key: username
            # - name: SPRING_DATASOURCE_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: db-secret
            #       key: password
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # 只读文件系统下，指定日志和临时目录
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: log-volume
              mountPath: /logs
      volumes:
        - name: tmp-volume
          emptyDir:
            sizeLimit: 64Mi
        - name: log-volume
          emptyDir:
            sizeLimit: 128Mi
      # 如果需要使用 hostNetwork 暴露外部 IP，可设置：
      # hostNetwork: true
      # dnsPolicy: ClusterFirstWithHostNet

---
# ==================== Ingress ====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: no-db-demo-ingress
  namespace: demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  rules:
    - host: demo.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: no-db-demo
                port:
                  number: 8080
  # tls:
  #   - hosts:
  #       - demo.your-domain.com
  #     secretName: demo-tls-secret

---
# ==================== HorizontalPodAutoscaler ====================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: no-db-demo-hpa
  namespace: demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: no-db-demo
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  # scaleUp:
  #   stabilizationWindowSeconds: 60
  #   policies:
  #     - type: Percent
  #       value: 50
  #       periodSeconds: 60
  # scaleDown:
  #   stabilizationWindowSeconds: 300
  #   policies:
  #     - type: Percent
  #       value: 25
  #       periodSeconds: 120
